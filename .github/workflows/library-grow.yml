name: FTSE Library Ladder

# Offline richness ladder for the focus market:
# A fundamentals grow → B screen-lite → C selective research (budget-gated).
# Scheduling lives in automation-orchestrator.yml (workflow_dispatch).
on:
  workflow_dispatch:
    inputs:
      max_tickers:
        description: "Override fundamentals max tickers (empty = policy)"
        type: string
        default: ""
      dry_run_research:
        description: "List research targets without calling Cursor agent"
        type: boolean
        default: false
      skip_research:
        description: "Skip selective research layer"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ftse-library-grow
  cancel-in-progress: false

jobs:
  library-ladder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Ensure Pro billing policy (8th) + plan tickers
        id: plan
        run: |
          ROOT="docs/data/library"
          mkdir -p "$ROOT"
          # Preserve focus_market / graduated_markets — do not force sp500.
          ftse-library --policy "$ROOT/policy.json" policy \
            --plan-monthly-usd 20 \
            --weekly-fraction 0.1 \
            --refresh-day 8 >/dev/null
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          from value_investor.agent_model_policy import grow_ticker_budget, load_policy

          policy = load_policy(Path("docs/data/library/policy.json"))
          plan = grow_ticker_budget(policy)
          out = Path(os.environ["GITHUB_OUTPUT"])
          max_tickers = os.environ.get("INPUT_MAX", "").strip() or str(plan["max_tickers"])

          def emit(**kwargs):
              with out.open("a", encoding="utf-8") as fh:
                  for key, value in kwargs.items():
                      fh.write(f"{key}={value}\n")

          emit(
              skip="false",
              max_tickers=max_tickers,
              surplus=str(plan["surplus_day"]).lower(),
              model=plan["research_model"],
              weekly_usd=str(plan["weekly_library_usd"]),
          )
          print(json.dumps(plan, indent=2))
          PY
        env:
          INPUT_MAX: ${{ github.event.inputs.max_tickers }}

      - name: Run offline ladder
        if: steps.plan.outputs.skip != 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          ROOT="docs/data/library"
          ARGS="--root $ROOT --policy $ROOT/policy.json ladder --max-tickers ${{ steps.plan.outputs.max_tickers }} --json"
          if [ "${{ github.event.inputs.dry_run_research }}" = "true" ]; then
            ARGS="$ARGS --dry-run-research"
          fi
          if [ "${{ github.event.inputs.skip_research }}" = "true" ]; then
            ARGS="$ARGS --skip-research"
          fi
          # Research only when key present; otherwise dry-run research
          if [ -z "$CURSOR_API_KEY" ]; then
            ARGS="$ARGS --dry-run-research"
          fi
          ftse-library $ARGS | tee "$ROOT/last_ladder.json"
          FOCUS=$(python3 -c "import json; print(json.load(open('$ROOT/policy.json')).get('focus_market','sp500'))")
          ftse-library --root "$ROOT" --policy "$ROOT/policy.json" status --markets "$FOCUS" --json \
            | tee "$ROOT/status_snapshot.json"
          ftse-library --root "$ROOT" --policy "$ROOT/policy.json" graduate --dry-run --json \
            | tee "$ROOT/graduation_snapshot.json" || true
          # Refresh Automation tab snapshot for the dashboard.
          ftse-library --root "$ROOT" --policy "$ROOT/policy.json" automation-status \
            --output docs/data/automation.json

      - name: Commit library ladder artifacts
        id: commit
        if: steps.plan.outputs.skip != 'true'
        continue-on-error: true
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore: run offline library ladder (focus market)"
          file_pattern: "docs/data/library/** docs/data/automation.json"
          # Email report / other automations may push to main while the ladder runs.
          skip_fetch: false

      - name: Rebase-push if commit raced with another automation
        if: steps.plan.outputs.skip != 'true' && steps.commit.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git push origin HEAD:main
