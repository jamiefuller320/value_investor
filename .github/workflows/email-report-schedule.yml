name: Schedule FTSE Email Report

# Thin cron wrapper that dispatches FTSE 100 Email Report via workflow_dispatch
# so weekly and manual runs share the same code path.
on:
  schedule:
    # TEMPORARY same-day test (any weekday) — 10:10 UTC on 2026-07-13.
    # Monday-only temp slots earlier today never appeared in Actions.
    # Remove this entry after a successful scheduled dispatch.
    - cron: "10 10 * * *"
    # Optimum weekly slot (off the hour to reduce GitHub schedule drops)
    - cron: "17 7 * * 1"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch-email-report:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch FTSE 100 Email Report
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "email-report.yml",
              ref: "main",
            });
            core.info("Dispatched email-report.yml on main via workflow_dispatch");
