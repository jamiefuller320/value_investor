name: Schedule FTSE Email Report

# Thin cron wrapper that dispatches FTSE 100 Email Report via workflow_dispatch
# so weekly and manual runs share the same code path.
on:
  schedule:
    # TEMPORARY test slot — Monday 09:22 UTC (2026-07-13). Replace with
    # optimum weekly cron after the test run succeeds: "17 7 * * 1"
    - cron: "22 9 * * 1"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch-email-report:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch FTSE 100 Email Report
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "email-report.yml",
              ref: "main",
            });
            core.info("Dispatched email-report.yml on main via workflow_dispatch");
