name: Schedule FTSE Email Report

# Thin cron wrapper that dispatches FTSE Email Report via workflow_dispatch
# so weekly and manual runs share the same code path.
# GitHub schedule events are best-effort; prefer Actions → Run workflow for
# on-demand runs. Cron is offset from :00 to reduce peak-load drops.
on:
  schedule:
    # Monday 07:17 UTC (off the hour)
    - cron: "17 7 * * 1"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch-email-report:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch FTSE Email Report
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "email-report.yml",
              ref: "main",
            });
            core.info("Dispatched email-report.yml on main via workflow_dispatch");
