name: Schedule FTSE Email Report

# Thin manual/backup wrapper that dispatches FTSE Email Report via
# workflow_dispatch. Primary Sunday scheduling lives in
# automation-orchestrator.yml (markets closed — quieter Actions time).
on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch-email-report:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch FTSE Email Report
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "email-report.yml",
              ref: "main",
            });
            core.info("Dispatched email-report.yml on main via workflow_dispatch");
