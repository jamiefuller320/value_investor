name: FTSE 100 Email Report

on:
  schedule:
    # Monday 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      limit:
        description: "Limit number of companies (leave empty for full FTSE 100)"
        required: false
        type: string
        default: ""
      dry_run:
        description: "Build the report without sending email"
        required: false
        type: boolean
        default: false
      agent_intro:
        description: "Add Cursor-written executive intro (requires CURSOR_API_KEY secret)"
        required: false
        type: boolean
        default: true

jobs:
  email-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Run screener and email report
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.limit }}" ]; then
              ARGS="$ARGS --limit ${{ inputs.limit }}"
            fi
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              ARGS="$ARGS --dry-run"
            fi
            if [ "${{ inputs.agent_intro }}" = "true" ] && [ -n "$CURSOR_API_KEY" ]; then
              ARGS="$ARGS --agent-intro"
            fi
          elif [ -n "$CURSOR_API_KEY" ]; then
            ARGS="--agent-intro"
          fi
          ftse-email $ARGS

      - name: Upload report artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: email-report-${{ github.run_id }}
          path: |
            output/email_report.html
            output/email_report.txt
            output/latest_signals.csv
          retention-days: 7
