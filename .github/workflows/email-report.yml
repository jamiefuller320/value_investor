name: FTSE Email Report

# Reliable entrypoint: always run via workflow_dispatch (manual Actions UI,
# gh workflow run, or the companion schedule-trigger workflow).
# Do not attach cron here — GitHub schedule events at hour boundaries are
# best-effort and may be delayed or dropped.
on:
  workflow_dispatch:

# Only one report run at a time so dashboard commits cannot race on main.
concurrency:
  group: ftse-email-report
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  email-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Preflight checks
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          TICKER_API_KEY: ${{ secrets.TICKER_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: ftse-preflight --require-email

      - name: Screen, build reports, and publish dashboard
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          TICKER_API_KEY: ${{ secrets.TICKER_API_KEY }}
        run: |
          ARGS="--dry-run --publish-dashboard"
          if [ -n "$CURSOR_API_KEY" ]; then
            ARGS="$ARGS --deep-analysis --research-docs"
          fi
          ftse-email $ARGS

      - name: Send email report
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: ftse-email --send-only

      # Rebase in case main moved (e.g. PR merge) during the long screen step.
      - name: Sync main before dashboard commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin "${{ github.ref_name }}"

      - name: Commit dashboard data
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore: update dashboard data [skip ci]"
          file_pattern: docs/data/** docs/research/*
          skip_fetch: false
