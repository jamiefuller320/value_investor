name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - "docs/data/**"
      - "docs/research/**"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + test deps
        run: pip install -e ".[dev]"

      - name: Pytest
        run: pytest -q
