name: Verify Cursor agents

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Verify CURSOR_API_KEY
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: ftse-verify-key

      - name: Functional test — screen subset + deep analysis
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          ftse-screen --limit 10
          ftse-email --dry-run --skip-screen --deep-analysis
